<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>헤어미스트 SKU 리서치 보드</title>
  <style>
    :root {
      --bg: #f7f2e8;
      --paper: #fffdfa;
      --paper-2: rgba(255, 252, 246, 0.86);
      --ink: #251f18;
      --muted: #6c625a;
      --line: rgba(37, 31, 24, 0.12);
      --shadow: 0 20px 40px rgba(51, 36, 22, 0.08);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --sky: #dce9f4;
      --sky-ink: #345d80;
      --olive: #dfe7d2;
      --olive-ink: #54663a;
      --rose: #f3dde1;
      --rose-ink: #8c4b57;
      --amber: #f3e4c5;
      --amber-ink: #8e6322;
      --violet: #e8def1;
      --violet-ink: #66507f;
      --mint: #d8ece4;
      --mint-ink: #3f6c5c;
      --red-soft: #f7dfd4;
      --red-ink: #9a4e34;
      --green-soft: #deecd9;
      --green-ink: #47713c;
      --blue-soft: #dde9f7;
      --blue-ink: #365f8b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: "Pretendard Variable", "SUIT Variable", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(210, 150, 102, 0.2), transparent 26%),
        linear-gradient(180deg, #f9f4eb 0%, #f5eee2 100%);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      height: 72px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(37, 31, 24, 0.08);
      background: rgba(255, 252, 246, 0.86);
      backdrop-filter: blur(18px);
      z-index: 30;
      flex-shrink: 0;
    }

    .toolbar-title {
      min-width: 260px;
    }

    .toolbar-title strong {
      display: block;
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .toolbar-title span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .search-wrap {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }

    .search-wrap input {
      width: 100%;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 0 18px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.88);
      outline: none;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    button,
    .pill {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.84);
      color: var(--ink);
      border-radius: 999px;
      height: 40px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #fff;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: default;
    }

    .viewport {
      position: relative;
      flex: 1 1 auto;
      overflow: hidden;
      background-image:
        radial-gradient(circle, rgba(87, 69, 47, 0.17) 1px, transparent 1.1px);
      background-size: 20px 20px;
      background-position: 10px 10px;
    }

    .world {
      position: absolute;
      inset: 0 auto auto 0;
      width: 6200px;
      height: 9800px;
      transform-origin: 0 0;
    }

    .world::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(65, 48, 29, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(65, 48, 29, 0.05) 1px, transparent 1px);
      background-size: 100px 100px;
      border-radius: 28px;
      pointer-events: none;
    }

    .section-panel {
      position: absolute;
      border: 1.5px solid var(--section-line, rgba(37, 31, 24, 0.16));
      border-radius: 28px;
      background: var(--section-bg, rgba(255, 252, 247, 0.56));
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.52),
        inset 0 156px 0 var(--section-band, rgba(255, 255, 255, 0.3));
      pointer-events: none;
      z-index: 0;
    }

    .section-panel header {
      position: absolute;
      left: 22px;
      top: 18px;
      padding: 8px 14px;
      border-radius: 14px;
      border: 1px solid var(--section-line, rgba(37, 31, 24, 0.12));
      background: var(--section-header-bg, rgba(255, 252, 247, 0.98));
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .section-panel header strong {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(37, 31, 24, 0.08);
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    .section-panel p {
      position: absolute;
      left: 24px;
      top: 72px;
      width: calc(100% - 48px);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin: 0;
    }

    .board-item {
      position: absolute;
      border: 1px solid rgba(37, 31, 24, 0.1);
      background: var(--paper-2);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
      transition: box-shadow 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
      z-index: 1;
    }

    .board-item:hover {
      box-shadow: 0 22px 44px rgba(51, 36, 22, 0.12);
      border-color: rgba(37, 31, 24, 0.2);
    }

    .board-item.dimmed {
      opacity: 0.2;
    }

    .board-item.highlight {
      box-shadow: 0 0 0 3px rgba(197, 93, 45, 0.24), 0 24px 52px rgba(51, 36, 22, 0.16);
      border-color: rgba(197, 93, 45, 0.48);
    }

    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px 10px;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .board-item.dragging {
      z-index: 40;
      box-shadow: 0 28px 56px rgba(51, 36, 22, 0.2);
      border-color: rgba(197, 93, 45, 0.42);
    }

    .item-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .item-number {
      min-width: 34px;
      height: 26px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(37, 31, 24, 0.08);
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: 0.02em;
    }

    .item-chip,
    .tag-chip,
    .source-chip,
    .tier-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0 10px;
      height: 26px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .item-chip.sky,
    .tag-chip.sky {
      background: var(--blue-soft);
      color: var(--blue-ink);
    }

    .item-chip.olive,
    .tag-chip.olive {
      background: var(--green-soft);
      color: var(--green-ink);
    }

    .item-chip.amber,
    .tag-chip.amber {
      background: var(--amber);
      color: var(--amber-ink);
    }

    .item-chip.rose,
    .tag-chip.rose {
      background: var(--rose);
      color: var(--rose-ink);
    }

    .item-chip.violet,
    .tag-chip.violet {
      background: var(--violet);
      color: var(--violet-ink);
    }

    .item-chip.mint,
    .tag-chip.mint {
      background: var(--mint);
      color: var(--mint-ink);
    }

    .tier-chip.tier-a {
      background: rgba(78, 138, 59, 0.13);
      color: var(--green-ink);
      border-color: rgba(78, 138, 59, 0.18);
    }

    .tier-chip.tier-b {
      background: rgba(197, 141, 51, 0.14);
      color: #906322;
      border-color: rgba(197, 141, 51, 0.18);
    }

    .tier-chip.tier-c {
      background: rgba(120, 92, 167, 0.12);
      color: var(--violet-ink);
      border-color: rgba(120, 92, 167, 0.18);
    }

    .meta-signal {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .note-card {
      padding-bottom: 12px;
    }

    .note-card .note-body {
      padding: 0 16px 8px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
      min-height: 100px;
      outline: none;
      white-space: pre-wrap;
    }

    .note-card .note-body[contenteditable="true"]:focus {
      background: rgba(255, 255, 255, 0.78);
      border-radius: 14px;
    }

    .note-card footer {
      padding: 0 16px;
      color: var(--muted);
      font-size: 12px;
    }

    .product-card {
      width: 330px;
      min-height: 352px;
      cursor: pointer;
    }

    .product-card h3 {
      margin: 8px 16px 6px;
      font-size: 17px;
      line-height: 1.3;
      letter-spacing: -0.03em;
    }

    .product-media {
      margin: 0 16px;
      height: 128px;
      padding: 10px 12px;
      box-sizing: border-box;
      border-radius: 16px;
      background: linear-gradient(180deg, #f9f4eb, #f1ebe3);
      border: 1px solid rgba(37, 31, 24, 0.08);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-media img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: transparent;
      filter: drop-shadow(0 10px 18px rgba(37, 31, 24, 0.12));
    }

    .media-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
      font-weight: 900;
      color: rgba(37, 31, 24, 0.72);
      font-size: 20px;
      letter-spacing: 0.06em;
    }

    .product-meta,
    .product-score {
      margin: 0 16px;
      color: var(--muted);
      font-size: 12px;
    }

    .product-score {
      margin-top: 6px;
    }

    .product-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 16px 0;
    }

    .product-tags.compact {
      margin: 0 0 12px;
    }

    .micro-list {
      list-style: none;
      padding: 0;
      margin: 10px 16px 0;
      display: grid;
      gap: 8px;
    }

    .micro-list li {
      font-size: 12px;
      line-height: 1.45;
      color: var(--ink);
    }

    .micro-list strong {
      color: var(--muted);
      font-weight: 800;
      margin-right: 4px;
    }

    .evidence-block {
      margin: 10px 16px 0;
      padding-top: 10px;
      border-top: 1px solid rgba(37, 31, 24, 0.08);
    }

    .evidence-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .evidence-lines {
      display: grid;
      gap: 6px;
      margin-bottom: 8px;
    }

    .evidence-lines div {
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    .source-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 16px 0;
    }

    .cta-row.compact {
      margin: 10px 0 0;
    }

    .source-chip {
      text-decoration: none;
      background: rgba(37, 31, 24, 0.06);
      color: var(--ink);
      border-color: rgba(37, 31, 24, 0.08);
    }

    .source-chip:hover {
      background: rgba(37, 31, 24, 0.12);
    }

    .source-chip.primary {
      background: rgba(76, 127, 112, 0.12);
      color: var(--mint-ink);
      border-color: rgba(76, 127, 112, 0.18);
      font-weight: 800;
    }

    .source-chip.primary:hover {
      background: rgba(76, 127, 112, 0.18);
    }

    .memo-input {
      margin: 0 16px 16px;
      width: calc(100% - 32px);
      height: 56px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid rgba(37, 31, 24, 0.1);
      background: rgba(255, 255, 255, 0.78);
      padding: 10px 12px;
      font: inherit;
      font-size: 12px;
      color: var(--ink);
      outline: none;
    }

    .panel-card {
      padding-bottom: 18px;
    }

    .panel-card .panel-body {
      padding: 0 18px 16px;
    }

    .panel-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .map-card {
      width: 2380px;
      height: 1420px;
    }

    .map-card .panel-body {
      height: calc(100% - 58px);
      display: flex;
      flex-direction: column;
    }

    .map-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .map-topline p {
      font-size: 13px;
    }

    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(37, 31, 24, 0.05);
      font-size: 12px;
      color: var(--muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .map-svg-wrap {
      flex: 1 1 auto;
      border-radius: 20px;
      border: 1px solid rgba(37, 31, 24, 0.08);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(251, 248, 242, 0.94));
      overflow: hidden;
    }

    .map-point circle {
      transition: r 0.16s ease, stroke-width 0.16s ease, filter 0.16s ease;
    }

    .map-point:hover circle,
    .map-point.is-active circle {
      r: 13;
      stroke-width: 4;
      filter: drop-shadow(0 10px 18px rgba(37, 31, 24, 0.16));
    }

    .map-footnotes {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .map-footnotes .mini {
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(37, 31, 24, 0.05);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .table-card {
      width: 2380px;
    }

    .table-card.table-core {
      height: 1660px;
    }

    .table-card.table-extended {
      height: 1280px;
    }

    .table-toolbar {
      padding: 0 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .table-shell {
      margin: 0 18px 18px;
      border: 1px solid rgba(37, 31, 24, 0.08);
      border-radius: 18px;
      overflow: auto;
      height: calc(100% - 106px);
      background: rgba(255, 255, 255, 0.88);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 2480px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fbf6ef;
      font-size: 12px;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid rgba(37, 31, 24, 0.08);
      padding: 12px 10px;
      white-space: nowrap;
    }

    .sort-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      background: transparent;
      padding: 0;
      height: auto;
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    .sort-button:hover {
      background: transparent;
      color: var(--ink);
    }

    .sort-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(37, 31, 24, 0.06);
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .sort-button.is-active .sort-indicator {
      background: rgba(76, 127, 112, 0.14);
      color: var(--mint-ink);
    }

    tbody td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(37, 31, 24, 0.06);
      vertical-align: top;
      font-size: 12px;
      line-height: 1.45;
    }

    tbody tr:hover td {
      background: rgba(37, 31, 24, 0.025);
    }

    tbody td a {
      color: var(--sky-ink);
      text-decoration: none;
      word-break: break-all;
    }

    tbody td a:hover {
      text-decoration: underline;
    }

    .target-card {
      width: 2480px;
      min-height: 600px;
    }

    .target-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 0 18px 18px;
    }

    .target-box {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(37, 31, 24, 0.08);
      background: rgba(255, 255, 255, 0.9);
    }

    .target-box h4 {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: -0.03em;
    }

    .target-box ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .target-box li + li {
      margin-top: 4px;
    }

    .map-preview {
      position: fixed;
      z-index: 80;
      width: 300px;
      border-radius: 20px;
      border: 1px solid rgba(37, 31, 24, 0.12);
      background: rgba(255, 252, 246, 0.97);
      box-shadow: 0 24px 48px rgba(51, 36, 22, 0.18);
      backdrop-filter: blur(14px);
      pointer-events: none;
      overflow: hidden;
      display: none;
    }

    .map-preview.visible {
      display: block;
    }

    .map-preview .preview-body {
      padding: 14px 14px 16px;
    }

    .map-preview .preview-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 8px 0 4px;
    }

    .map-preview .preview-meta,
    .map-preview .preview-copy {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .map-preview .preview-copy {
      margin-top: 8px;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 72px 0 0 0;
      background: rgba(37, 31, 24, 0.14);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 70;
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-drawer {
      position: fixed;
      top: 72px;
      right: 0;
      bottom: 0;
      width: min(440px, 92vw);
      background: rgba(255, 252, 246, 0.98);
      border-left: 1px solid rgba(37, 31, 24, 0.1);
      box-shadow: -16px 0 40px rgba(51, 36, 22, 0.12);
      backdrop-filter: blur(18px);
      z-index: 75;
      transform: translateX(100%);
      transition: transform 0.22s ease;
      display: flex;
      flex-direction: column;
    }

    .detail-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(37, 31, 24, 0.08);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .drawer-title {
      min-width: 0;
    }

    .drawer-title h2 {
      margin: 8px 0 4px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: -0.04em;
    }

    .drawer-title p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .drawer-close {
      min-width: 40px;
      width: 40px;
      padding: 0;
    }

    .drawer-scroll {
      padding: 18px;
      overflow: auto;
      display: grid;
      gap: 16px;
    }

    .drawer-card {
      border-radius: 18px;
      border: 1px solid rgba(37, 31, 24, 0.08);
      background: rgba(255, 255, 255, 0.9);
      padding: 16px;
    }

    .drawer-card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: -0.02em;
    }

    .drawer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .drawer-metric {
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(37, 31, 24, 0.04);
    }

    .drawer-metric strong {
      display: block;
      font-size: 11px;
      color: var(--muted);

    function applySegmentModel() {
      const assignmentById = {};
      const orderById = {};

      Object.entries(segmentAssignments).forEach(([segmentId, ids]) => {
        ids.forEach((id, index) => {
          assignmentById[id] = segmentId;
          orderById[id] = index;
        });
      });

      products.forEach((product, index) => {
        const assignedSegment = assignmentById[product.id] || product.cluster || "daily-functional";
        product.cluster = assignedSegment;
        product.clusterLabel = clusterLabelMap[assignedSegment] || product.clusterLabel || assignedSegment;
        product.tone = clusterToneMap[assignedSegment] || product.tone || "sky";
        product.metaTags = productTagOverrides[product.id] || [];
        product.segmentOrder = Number.isFinite(orderById[product.id]) ? orderById[product.id] : 1000 + index;
      });

      sections.forEach((section) => {
        const layout = segmentLayoutConfig[section.id];
        if (!layout) return;
        products
          .filter((product) => product.cluster === section.id)
          .sort((a, b) => a.segmentOrder - b.segmentOrder)
          .forEach((product, index) => {
            const col = index % layout.cols;
            const row = Math.floor(index / layout.cols);
            product.defaultPos = {
              x: section.x + layout.insetX + (col * layout.gapX),
              y: section.y + layout.insetTop + (row * layout.gapY)
            };
          });
      });
    }

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        const positions = { ...(parsed.positions || {}) };
        const needsLayoutReset = (parsed.layoutVersion || 1) < LAYOUT_VERSION;
        if (needsLayoutReset) {
          for (const id of LAYOUT_RESET_IDS) {
            delete positions[id];
          }
        }
        return {
          layoutVersion: LAYOUT_VERSION,
          view: needsLayoutReset ? { ...WORLD_DEFAULT } : (parsed.view || { ...WORLD_DEFAULT }),
          positions,
          memos: parsed.memos || {},
          noteBodies: parsed.noteBodies || {},
          userNotes: parsed.userNotes || [],
          selectedProductId: parsed.selectedProductId || null,
          tableSort: parsed.tableSort || {
            core: { key: "no", direction: "asc" },
            extended: { key: "no", direction: "asc" }
          }
        };
      } catch (error) {
        return {
          layoutVersion: LAYOUT_VERSION,
          view: { ...WORLD_DEFAULT },
          positions: {},
          memos: {},
          noteBodies: {},
          userNotes: [],
          selectedProductId: null,
          tableSort: {
            core: { key: "no", direction: "asc" },
            extended: { key: "no", direction: "asc" }
          }
        };
      }

    function formatInt(value) {
      return new Intl.NumberFormat("ko-KR").format(Math.round(value));
    }

    function formatUnit(value) {
      if (!Number.isFinite(value)) return "-";
      return value >= 100 ? formatInt(value) + "원/ml" : value.toFixed(1) + "원/ml";
    }

    function formatKrw(value) {
      if (!Number.isFinite(value)) return "-";
      return formatInt(value) + "원";
    }

    function parseDisplayedPriceToKrw(value) {
      if (value == null) return NaN;
      const text = String(value).trim();
      if (!text) return NaN;
      if (text.includes("$")) {
        const numeric = Number(text.replace(/[^0-9.]/g, ""));
        return Number.isFinite(numeric) ? Math.round(numeric * FX_USD_KRW) : NaN;
      }
      const numeric = Number(text.replace(/[^0-9.]/g, ""));
      return Number.isFinite(numeric) ? Math.round(numeric) : NaN;
    }

    function getListPriceKrw(product) {
      return Number.isFinite(product.priceListKrw) ? product.priceListKrw : parseDisplayedPriceToKrw(product.priceListDisplay);
    }

    function getSalePriceKrw(product) {
      return Number.isFinite(product.priceSaleKrw) ? product.priceSaleKrw : parseDisplayedPriceToKrw(product.priceSaleDisplay);
    }

    function getProductById(productId) {
      return products.find((item) => item.id === productId) || null;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function getDisplaySources(product) {
      const seen = new Set([product.url]);
      return (product.sources || []).filter((source) => {
        if (!source || !source.url || seen.has(source.url)) return false;
        seen.add(source.url);
        return true;
      });
    }

    function buildFallbackMediaSvg(product) {
      const tonePalette = {
        sky: ["#eef5ff", "#dde9fb", "#466b92"],
        olive: ["#eff4e7", "#dde7d0", "#556b3a"],
        mint: ["#e9f6ef", "#d7e9e1", "#3d675b"],
        amber: ["#fbf1df", "#f1dfc1", "#8f6224"],
        rose: ["#fbe9ef", "#f3d6df", "#91546a"],
        violet: ["#f1ebfb", "#e1d5f0", "#664b8a"]
      };
      const [start, end, text] = tonePalette[product.tone] || tonePalette.sky;
      const encodeSvgText = (textValue) => String(textValue ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
      const badge = encodeSvgText((product.productLabel || product.clusterLabel || "hair mist").slice(0, 30).toUpperCase());
      const brand = encodeSvgText((product.brand || "HAIR MIST").slice(0, 20));
      const title = encodeSvgText((product.productName || product.title || "").slice(0, 28));
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${start}" />
              <stop offset="100%" stop-color="${end}" />
            </linearGradient>
          </defs>
          <rect width="520" height="220" rx="28" fill="url(#bg)" />
          <rect x="28" y="28" width="464" height="164" rx="22" fill="rgba(255,255,255,0.62)" />
          <text x="44" y="82" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="${text}" letter-spacing="1.2">${badge}</text>
          <text x="44" y="132" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#251f18">${brand}</text>
          <text x="44" y="170" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="rgba(37,31,24,0.72)">${title}</text>
        </svg>`
      )}`;
    }

    function renderProductMedia(product, mediaHost, inlineStyle = "") {
      const styleAttr = inlineStyle ? ` style="${escapeHtml(inlineStyle)}"` : "";
      const src = product.image || buildFallbackMediaSvg(product);
      return `
        <div class="product-media"${styleAttr} data-media-host="${escapeHtml(mediaHost)}">
          <img src="${escapeHtml(src)}" alt="${escapeHtml(product.title)}" loading="lazy" />
        </div>
      `;
    }

      if (!tags?.length) return "";
      const className = extraClass ? `product-tags ${extraClass}` : "product-tags";
      return `

          ${tags.map((tag) => `<span class="tag-chip ${escapeHtml(productTagToneMap[tag] || "sky")}">${escapeHtml(tag)}</span>`).join("")}

    function getTableSortValue(product, key) {
      switch (key) {
        case "no":
          return Number(product.no);
        case "volumeMl":
          return product.volumeMl;
        case "unitPriceKrwMl":
          return product.unitPriceKrwMl;
        case "priceListKrw":
          return getListPriceKrw(product);
        case "priceSaleKrw":
          return getSalePriceKrw(product);
        default:
          return product[key];
      }
    }

    function getSortIndicator(kind, key, sortable) {
      if (!sortable) return "";
      const current = state.tableSort[kind];
      if (!current || current.key !== key) return "↕";
      return current.direction === "asc" ? "↑" : "↓";
    }

    function sortTableRows(kind, rows) {
      const current = state.tableSort[kind];
      if (!current) return rows;
      const { key, direction } = current;
      return [...rows].sort((a, b) => {
        const left = getTableSortValue(a, key);
        const right = getTableSortValue(b, key);
        if (typeof left === "number" && typeof right === "number") {
          const leftFinite = Number.isFinite(left);
          const rightFinite = Number.isFinite(right);
          if (!leftFinite && !rightFinite) return 0;
          if (!leftFinite) return 1;
          if (!rightFinite) return -1;
          return direction === "asc" ? left - right : right - left;
        }
        return direction === "asc"
          ? String(left ?? "").localeCompare(String(right ?? ""), "ko")
          : String(right ?? "").localeCompare(String(left ?? ""), "ko");
      });
    }

    function openDetailDrawer(productId) {
      const product = getProductById(productId);
      if (!product) return;
      state.selectedProductId = productId;
      renderDrawerContent(product);
      detailDrawer.classList.add("open");
      drawerBackdrop.classList.add("open");
      detailDrawer.setAttribute("aria-hidden", "false");
      saveState();
      highlightProductCard(productId);
      document.querySelectorAll(".map-point").forEach((node) => {
        node.classList.toggle("is-active", node.dataset.productId === productId);
      });
    }

    function closeDetailDrawer() {
      state.selectedProductId = null;
      detailDrawer.classList.remove("open");
      drawerBackdrop.classList.remove("open");
      detailDrawer.setAttribute("aria-hidden", "true");
      document.querySelectorAll(".map-point.is-active").forEach((node) => node.classList.remove("is-active"));
      saveState();
    }

    function showMapPreview(productId, clientX, clientY) {
      const product = getProductById(productId);
      if (!product) return;
      mapPreview.classList.add("visible");
      mapPreview.setAttribute("aria-hidden", "false");
      mapPreview.innerHTML = `
        ${renderProductMedia(product, `preview-${product.id}`, "margin:0;height:96px;border:none;border-radius:0;")}
        <div class="preview-body">
          <div class="item-heading">
            <span class="item-number">${escapeHtml(product.no)}</span>
            <span class="item-chip ${product.tone}">${escapeHtml(product.clusterLabel)}</span>
          </div>
          <div class="preview-title">${escapeHtml(product.title)}</div>
          <div class="preview-meta">${escapeHtml(formatKrw(getSalePriceKrw(product)))} · ${escapeHtml(product.volumeMl)}ml · ${escapeHtml(formatUnit(product.unitPriceKrwMl))}</div>
          <div class="preview-copy">${escapeHtml(product.concept)}</div>
        </div>
      `;
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const tooltipWidth = 300;
      const tooltipHeight = 220;
      const left = Math.min(clientX + 18, viewportWidth - tooltipWidth - 18);
      const top = Math.min(clientY + 18, viewportHeight - tooltipHeight - 18);
      mapPreview.style.left = `${Math.max(18, left)}px`;
      mapPreview.style.top = `${Math.max(90, top)}px`;
      applyImageFallbacks();
    }

    function hideMapPreview() {
      mapPreview.classList.remove("visible");
      mapPreview.setAttribute("aria-hidden", "true");
      mapPreview.innerHTML = "";
    }

    function renderSections() {
      for (const section of sections) {
        const bounds = getSectionBounds(section);
        const styles = sectionStyleMap[section.id] || {};
        const count = products.filter((product) => product.cluster === section.id).length;
        const node = document.createElement("section");
        node.className = "section-panel";
        node.style.left = bounds.x + "px";
        node.style.top = bounds.y + "px";
        node.style.width = bounds.w + "px";
        node.style.height = bounds.h + "px";
        if (styles.bg) node.style.setProperty("--section-bg", styles.bg);
        if (styles.line) node.style.setProperty("--section-line", styles.line);
        if (styles.band) node.style.setProperty("--section-band", styles.band);
        if (styles.headerBg) node.style.setProperty("--section-header-bg", styles.headerBg);
        node.innerHTML = `
          <header>${escapeHtml(section.title)}<strong>${count}개</strong></header>
          <p>${escapeHtml(section.blurb)}</p>

        world.appendChild(node);

    function renderMapCard() {
      const card = document.createElement("article");
      card.className = "board-item panel-card map-card";

      card.style.top = pos.y + "px";
      const eligible = products.filter((product) => product.mapEligible !== false);
      const maxX = 2100;
      const minX = 0;
      const minY = 1;
      const maxY = 5;
      const pad = { left: 110, right: 60, top: 55, bottom: 95 };
      const width = 2300;
      const height = 860;
      const plotWidth = width - pad.left - pad.right;
      const plotHeight = height - pad.top - pad.bottom;
      const xPos = (value) => pad.left + ((value - minX) / (maxX - minX)) * plotWidth;
      const yPos = (value) => pad.top + (1 - (value - minY) / (maxY - minY)) * plotHeight;
      const xTicks = [0, 80, 150, 300, 600, 1000, 1500, 2000];
      const yTicks = [
        { value: 1, label: "향 중심" },

      const yGrid = yTicks.map((tick) => `
        <g>
          <line x1="${pad.left}" y1="${yPos(tick.value)}" x2="${pad.left + plotWidth}" y2="${yPos(tick.value)}" stroke="rgba(37,31,24,0.08)" stroke-dasharray="5 7"></line>
          <text x="${pad.left - 16}" y="${yPos(tick.value) + 4}" text-anchor="end" font-size="11" fill="#6c625a">${escapeHtml(tick.label)}</text>

        <rect x="${xPos(250)}" y="${yPos(5)}" width="${xPos(360) - xPos(250)}" height="${yPos(4.2) - yPos(5)}" rx="20" fill="rgba(197,93,45,0.11)" stroke="rgba(197,93,45,0.34)"></rect>
        <text x="${xPos(305)}" y="${yPos(5) - 10}" text-anchor="middle" font-size="11" fill="#9a4e34" font-weight="800">90~100ml science형 후보</text>

      card.innerHTML = `
        <div class="drag-handle" data-drag-handle="true">
          <div class="item-heading">
            <span class="item-chip mint">포지셔닝맵</span>
            <span class="item-chip amber">x = ml당 단가</span>

          </div>
          <span class="meta-signal">hover = 미니 카드 / click = 상세 패널</span>
        </div>
        <div class="panel-body">
          <div class="map-topline">
            <p>쭈드레님이 실제로 노려야 할 공간을 보기 위해, 가격은 ml당 단가로 통일했고 메시지 강도는 향 중심 ~ direct multi-bond까지 5단계로 정성 점수화했습니다. 숫자 점 위에 마우스를 올리면 미니 카드가, 클릭하면 우측 상세 패널이 열립니다.</p>

      world.appendChild(card);

    function renderTableCard(kind, x, y, ids, title, description) {
      const card = document.createElement("article");

      const rows = sortTableRows(kind, products.filter((product) => ids.includes(product.id)));
      const columns = [
        { key: "no", label: "번호", sortable: true },
        { key: "brandKo", label: "제품", sortable: false },
        { key: "form", label: "제형", sortable: false },
        { key: "brand", label: "브랜드", sortable: false },
        { key: "productName", label: "상품명", sortable: false },
        { key: "volumeMl", label: "용량", sortable: true },
        { key: "unitPriceKrwMl", label: "ml당단가", sortable: true },
        { key: "priceListKrw", label: "판매가(KRW)", sortable: true },
        { key: "priceSaleKrw", label: "할인가(KRW)", sortable: true },
        { key: "concept", label: "컨셉/특징", sortable: false },
        { key: "manufacturer", label: "제조사", sortable: false },
        { key: "note", label: "비고", sortable: false },

        { key: "silicone", label: "실리콘", sortable: false },
        { key: "uspIngredients", label: "USP 구현 추정", sortable: false },
        { key: "ewg", label: "EWG", sortable: false },
        { key: "performance", label: "성과지표", sortable: false }
      ];
      const thead = columns.map((column) => {
        if (!column.sortable) return `<th>${escapeHtml(column.label)}</th>`;
        const isActive = state.tableSort[kind]?.key === column.key;
        return `
          <th>
            <button
              type="button"
              class="sort-button ${isActive ? "is-active" : ""}"
              data-sort-table="${kind}"
              data-sort-key="${column.key}"

              <span>${escapeHtml(column.label)}</span>
              <span class="sort-indicator">${escapeHtml(getSortIndicator(kind, column.key, true))}</span>
            </button>
          </th>
        `;
      }).join("");
      const tbody = rows.map((row) => {
        const cells = columns.map((column) => {
          const key = column.key;
          let value = row[key];
          if (key === "volumeMl") value = row.volumeMl + "ml";
          if (key === "unitPriceKrwMl") value = formatUnit(row.unitPriceKrwMl);
          if (key === "priceListKrw") value = formatKrw(getListPriceKrw(row));

          else value = escapeHtml(value);
          return `<td>${value}</td>`;
        }).join("");
        return `<tr>${cells}</tr>`;
      }).join("");

            <span class="item-chip ${kind === "core" ? "mint" : "rose"}">${escapeHtml(title)}</span>

        </div>
        <div class="table-shell">
          <table>
            <thead><tr>${thead}</tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      `;
      world.appendChild(card);
    }

              <li>권장 소비자가: 24,000원~29,000원</li>
              <li>직접 기준: VAMOOD 90ml 26,000원, Olaplex No.9 올영가 45,320원</li>
              <li>권장 좌표: ml당 250~350원, claimDepth 4.5 이상</li>
              <li>타깃 제조원가: 대략 4,500원~6,500원 가설</li>
              <li>전제: 3-bond 메시지, 임상/모발 물성 데이터, 향/패키지 고급감</li>
            </ul>
          </section>
          <section class="target-box">
            <h4>안 2. 150~200ml 대용량 본딩형</h4>
            <ul>
              <li>권장 소비자가: 17,900원~21,900원</li>
              <li>직접 기준: Hairplus 15,900원, Headspa7 17,000원, Tricell 20,000원</li>
              <li>권장 좌표: ml당 85~130원, claimDepth 4.0 전후</li>
              <li>타깃 제조원가: 대략 3,000원~5,000원 가설</li>
              <li>전제: 대중 소구용 성분 해석, 빠른 사용감, 열보호/엉킴 개선 체감</li>
            </ul>
          </section>
        </div>
      `;
      world.appendChild(card);
    }

    function renderUserNotes() {
      for (const note of state.userNotes) {
        const node = document.createElement("article");
        node.className = "board-item note-card";
        node.dataset.itemId = note.id;
        node.style.left = note.x + "px";
        node.style.top = note.y + "px";
        node.style.width = "280px";
        node.style.height = "220px";
        node.innerHTML = `
          <div class="drag-handle" data-drag-handle="true">
            <div class="item-heading">
              <span class="item-chip rose">사용자 메모</span>
            </div>
            <button type="button" data-delete-note="${escapeHtml(note.id)}">삭제</button>
          </div>
          <div class="note-body" contenteditable="true" data-user-note="${escapeHtml(note.id)}">${escapeHtml(note.body)}</div>
          <footer>로컬 저장됩니다.</footer>
        `;
        world.appendChild(node);
      }
    }

    function applyImageFallbacks() {
      document.querySelectorAll(".product-media img").forEach((img) => {
        img.addEventListener("error", () => {
          const host = img.parentElement;
          const productId = (host.dataset.mediaHost || "").replace(/^preview-/, "");
          const product = products.find((item) => item.id === productId);
          if (product && img.dataset.fallbackApplied !== "true") {
            img.dataset.fallbackApplied = "true";
            img.src = buildFallbackMediaSvg(product);
            return;
          }
          host.innerHTML = `<div class="media-fallback">${escapeHtml(product ? product.brand : "NO IMAGE")}</div>`;
        }, { once: true });
      });
    }

    function renderAll() {
      world.innerHTML = "";
      renderSections();
      renderNoteCards();
      renderProductCards();
      renderMapCard();
      renderTableCard(
        "core",
        3490,
        1650,
        Array.from(deepDiveIds),
        "딥다이브 매트릭스",
        "성분/알코올/실리콘/EWG/성과까지 최대한 채운 비교표"
      );
      renderTableCard(
        "extended",
        3490,
        3440,
        products.filter((product) => !deepDiveIds.has(product.id)).map((product) => product.id),
        "확장 가격군 매트릭스",
        "상품 수를 늘리기 위한 확장 가격군. 기능 깊이는 상대적으로 얕게 입력"
      );
      renderTargetCard();
      renderUserNotes();
      applyTransform();
      applySearchFilter();
      applyImageFallbacks();
      deepDivePill.textContent = `딥다이브 ${deepDiveIds.size}개`;
      extendedPill.textContent = `확장 가격군 ${products.length - deepDiveIds.size}개`;
      const selectedProduct = state.selectedProductId ? getProductById(state.selectedProductId) : null;
      if (selectedProduct) {
        renderDrawerContent(selectedProduct);
        detailDrawer.classList.add("open");
        drawerBackdrop.classList.add("open");
        detailDrawer.setAttribute("aria-hidden", "false");
      } else {
        state.selectedProductId = null;
        detailDrawer.classList.remove("open");
        drawerBackdrop.classList.remove("open");
        detailDrawer.setAttribute("aria-hidden", "true");
      }
    }

    function showRuntimeError(message) {
      const existing = document.getElementById("runtimeErrorBanner");
      if (existing) existing.remove();
      const banner = document.createElement("div");
      banner.id = "runtimeErrorBanner";
      banner.style.position = "fixed";
      banner.style.left = "16px";
      banner.style.bottom = "16px";
      banner.style.maxWidth = "560px";
      banner.style.zIndex = "9999";
      banner.style.background = "rgba(160, 56, 36, 0.96)";
      banner.style.color = "white";
      banner.style.padding = "14px 16px";
      banner.style.borderRadius = "16px";
      banner.style.boxShadow = "0 16px 40px rgba(0,0,0,0.2)";
      banner.style.fontSize = "13px";
      banner.style.lineHeight = "1.55";
      banner.textContent = `Runtime error: ${message}`;
      document.body.appendChild(banner);
    }

    function applyTransform() {
      world.style.transform = `translate(${state.view.x}px, ${state.view.y}px) scale(${state.view.scale})`;
      zoomLabel.textContent = `${Math.round(state.view.scale * 100)}%`;
    }

    function applySearchFilter() {
      const keyword = searchInput.value.trim().toLowerCase();
      document.querySelectorAll(".product-card").forEach((card) => {
        if (!keyword) {
          card.classList.remove("dimmed");
          return;
        }
        const haystack = card.dataset.searchIndex || "";
        card.classList.toggle("dimmed", !haystack.includes(keyword));
      });
    }

    function screenToWorld(clientX, clientY) {
      const rect = viewport.getBoundingClientRect();
      return {
        x: (clientX - rect.left - state.view.x) / state.view.scale,
        y: (clientY - rect.top - state.view.y) / state.view.scale
      };
    }

    function clampScale(value) {
      return Math.min(1.6, Math.max(0.45, value));
    }

    function zoomAt(clientX, clientY, nextScale) {
      const rect = viewport.getBoundingClientRect();
      const prevScale = state.view.scale;
      const worldX = (clientX - rect.left - state.view.x) / prevScale;
      const worldY = (clientY - rect.top - state.view.y) / prevScale;
      state.view.scale = clampScale(nextScale);
      state.view.x = clientX - rect.left - worldX * state.view.scale;
      state.view.y = clientY - rect.top - worldY * state.view.scale;
      applyTransform();
      saveState();
    }

    function highlightProductCard(productId) {
      document.querySelectorAll(".product-card").forEach((card) => {
        card.classList.toggle("highlight", card.dataset.itemId === productId);
      });
      setTimeout(() => {
        document.querySelectorAll(".product-card.highlight").forEach((card) => {
          if (card.dataset.itemId !== state.selectedProductId) card.classList.remove("highlight");
        });
      }, 2200);
    }

    viewport.addEventListener("wheel", (event) => {
      event.preventDefault();
      const delta = event.deltaY > 0 ? -0.08 : 0.08;
      zoomAt(event.clientX, event.clientY, state.view.scale + delta);
    }, { passive: false });

    viewport.addEventListener("pointerdown", (event) => {
      const handle = event.target.closest("[data-drag-handle]");
      if (handle) {
        const item = handle.closest(".board-item");
        if (!item) return;
        event.preventDefault();
        startDraggingItem(item, event.clientX, event.clientY);
        return;
      }

      const itemHit = event.target.closest(".board-item");
      if (itemHit) {
        if (isInteractiveBoardTarget(event.target)) return;
        dragCandidate = {
          id: itemHit.dataset.itemId,
          startX: event.clientX,
          startY: event.clientY
        };
        return;
      }

      if (!itemHit) {
        panState = {
          startX: event.clientX,
          startY: event.clientY,
          baseX: state.view.x,
          baseY: state.view.y
        };
      }
    });

    window.addEventListener("pointermove", (event) => {
      if (dragCandidate && !dragState) {
        const distance = Math.hypot(event.clientX - dragCandidate.startX, event.clientY - dragCandidate.startY);
        if (distance > 6) {
          const item = document.querySelector(`[data-item-id="${CSS.escape(dragCandidate.id)}"]`);
          if (item) {
            startDraggingItem(item, event.clientX, event.clientY);
          }
          dragCandidate = null;
        }
      }

      if (dragState) {
        const worldPos = screenToWorld(event.clientX, event.clientY);
        const nextX = worldPos.x - dragState.startOffsetX;
        const nextY = worldPos.y - dragState.startOffsetY;
        const item = document.querySelector(`[data-item-id="${CSS.escape(dragState.id)}"]`);
        if (item) {
          item.style.left = `${nextX}px`;
          item.style.top = `${nextY}px`;
        }
        state.positions[dragState.id] = { x: nextX, y: nextY };
        return;
      }

      if (panState) {
        state.view.x = panState.baseX + (event.clientX - panState.startX);
        state.view.y = panState.baseY + (event.clientY - panState.startY);
        applyTransform();
        hideMapPreview();
        return;
      }

      const hoverTarget = event.target instanceof Element ? event.target.closest(".map-point") : null;
      if (hoverTarget) {
        showMapPreview(hoverTarget.dataset.productId, event.clientX, event.clientY);
      } else {
        hideMapPreview();
      }
    });

    window.addEventListener("pointerup", () => {
      if (dragState || panState) {
        saveState();
      }
      document.querySelectorAll(".board-item.dragging").forEach((item) => item.classList.remove("dragging"));
      if (dragState) {
        window.setTimeout(() => {
          suppressClick = false;
        }, 0);
      }
      dragCandidate = null;
      dragState = null;
      panState = null;
    });

    world.addEventListener("input", (event) => {
      const noteTarget = event.target.closest("[data-note-body]");
      if (noteTarget) {
        state.noteBodies[noteTarget.dataset.noteBody] = noteTarget.innerText;
        saveState();
        return;
      }
      const userNoteTarget = event.target.closest("[data-user-note]");
      if (userNoteTarget) {
        const note = state.userNotes.find((item) => item.id === userNoteTarget.dataset.userNote);
        if (note) {
          note.body = userNoteTarget.innerText;
          saveState();
        }
        return;
      }
      const memoTarget = event.target.closest("[data-product-memo]");
      if (memoTarget) {
        state.memos[memoTarget.dataset.productMemo] = memoTarget.value;
        saveState();
      }
    });

    world.addEventListener("click", (event) => {
      if (suppressClick) return;
      const dot = event.target.closest(".map-point");
      if (dot) {
        showMapPreview(dot.dataset.productId, event.clientX, event.clientY);
        openDetailDrawer(dot.dataset.productId);
        return;
      }
      const sortButton = event.target.closest("[data-sort-table]");
      if (sortButton) {
        const tableKind = sortButton.dataset.sortTable;
        const sortKey = sortButton.dataset.sortKey;
        const current = state.tableSort[tableKind];
        state.tableSort[tableKind] = {
          key: sortKey,
          direction: current && current.key === sortKey && current.direction === "asc" ? "desc" : "asc"
        };
        saveState();
        renderAll();
        return;
      }
      const deleteBtn = event.target.closest("[data-delete-note]");
      if (deleteBtn) {
        const targetId = deleteBtn.dataset.deleteNote;
        state.userNotes = state.userNotes.filter((note) => note.id !== targetId);
        delete state.positions[targetId];
        saveState();
        renderAll();
        return;
      }
      const productCard = event.target.closest(".product-card");
      if (
        productCard &&
        !event.target.closest("textarea") &&
        !event.target.closest("a") &&
        !event.target.closest("[data-drag-handle]")
      ) {
        openDetailDrawer(productCard.dataset.itemId);
      }
    });

    world.addEventListener("keydown", (event) => {
      const productCard = event.target.closest(".product-card");
      if (!productCard) return;
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openDetailDrawer(productCard.dataset.itemId);
      }
    });

    document.getElementById("zoomInBtn").addEventListener("click", () => {
      const rect = viewport.getBoundingClientRect();
      zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, state.view.scale + 0.08);
    });

    document.getElementById("zoomOutBtn").addEventListener("click", () => {
      const rect = viewport.getBoundingClientRect();
      zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, state.view.scale - 0.08);
    });

    document.getElementById("addNoteBtn").addEventListener("click", () => {
      const id = `user-note-${Date.now()}`;
      state.userNotes.push({
        id,
        body: "새 메모",
        x: 120 + state.userNotes.length * 26,
        y: 1320 + state.userNotes.length * 20
      });
      state.positions[id] = { x: 120 + state.userNotes.length * 26, y: 1320 + state.userNotes.length * 20 };
      saveState();
      renderAll();
    });

    document.getElementById("resetLayoutBtn").addEventListener("click", () => {
      state.view = { ...WORLD_DEFAULT };
      state.positions = {};
      saveState();
      renderAll();
    });

    searchInput.addEventListener("input", applySearchFilter);
    drawerCloseBtn.addEventListener("click", closeDetailDrawer);
    drawerBackdrop.addEventListener("click", closeDetailDrawer);
    viewport.addEventListener("pointerleave", hideMapPreview);
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        hideMapPreview();
        closeDetailDrawer();
      }
    });

    try {
      renderAll();
    } catch (error) {
      showRuntimeError(error && error.message ? error.message : String(error));
      throw error;
    }
  </script>
</body>
</html>
